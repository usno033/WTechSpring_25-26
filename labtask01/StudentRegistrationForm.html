<!DOCTYPE html>
<html lang ="eng">
<title> HTML Page Design </title>
<head>
    <h1> Student Registration Page </h1>
</head>

<form>
<label for = "StudentName"> Student Name: </label>
<input type = "text" id = "StudentName" name = "StudentName" placeholder = "Enter Your Name">
<br><br>

<form>
<label for = "StudentCGPA"> Student CGPA: </label>
<input type = "text" id = "StudentCGPA" name = "StudentCGPA" placeholder = "Enter Your CGPA">
<br><br>

<input type ="radio" id ="GenderMale" name ="Gender" value = "Male">
<label for="GenderMale">Male</label>
<br><br>

<input type ="radio" id ="GenderFemale" name ="Gender" value = "Female">
<label for="GenderFemale">Female</label>
<br><br>

<label for ="Department"> Select Department: </label>
<select>
    <option values ="CSE"> CSE </option>
    <option values ="EEE"> EEE </option>
    <option values ="BBA"> BBA </option>
</select>
<br><br>

<form>
<label for = "StudentID"> Student ID: </label>
<input type = "text" id = "StudentID" name = "StudentID">
<br><br>

<label for ="Address">Address:</label>
<textarea id ="Address" name="Address" rows="4" cols ="60" placeholder="Enter Your Address here"></textarea>
<br><br>

<label for="DOB">Date of Birth: </label>
<input type="date" id="DOB" name ="DOB">
<br><br>

<form>
<label for = "Email"> Email: </label>
<input type = "text" id = "Email" name = "Email" placeholder = "Enter Your email">
<br><br>


<label for="InsertFile">Upload your Grade Report: </label>
<input type="file" id="InsertFile" name ="InsertFile">
<br><br>

<form>
<label for = "Term&Condition"> I agree to the terms and conditions </label>
<input type = "Checkbox" id = "" name = "Term&Condition">
<br><br>

<form>
<label for = "PhoneNumber"> Phone Number: </label>
<input type = "text" id = "PhoneNumber" name = "PhoneNumber" placeholder = "Enter Your Phone Number">
<br><br>

<label for = "Submit"> Submit your information </label>
<br><br>
<input type ="submit" id ="submit" name ="submit">
</form>
</html>
