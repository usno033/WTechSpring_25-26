<!DOCTYPE html>
<html lang="en">
<head>
<title>Lab Practice Performance</title>
<link rel="stylesheet" href="C:\webtech\WTechSpring_25-26\LabTaskPractice\Design\Style.css">

</head>
<body>
  <div class="form-container">
  <h1>Contact Us</h1>
  <form onsubmit="return validateForm()">
   <table>
      <tr>
      <td>
      <label for="firstname">FIRST NAME</label><br>
      <input type="text" id="firstname" name="firstname">
      </td>
      <td>
      <label for="lastname">LAST NAME</label><br>
      <input type="text" id="lastname" name="lastname">
      </td>
      </tr>
      <tr>
      <td>
      <label for="email">EMAIL</label><br>
      <input type="text" id="email" name="email">
      </td>
      <td>
      <label for="phone">PHONE NUMBER</label><br>
      <input type="text" id="phone" name="phone">
      </td>
      </tr>
      <tr>
      <td colspan="2">
      <label for="message">WHAT DO YOU HAVE IN MIND</label><br>
      <textarea name="message" id="message" rows="5" cols="45" placeholder="Please enter query..."></textarea>
      </td>
      </tr>
      <tr>
       <td colspan="2" style="text-align: center;">
       <input type="submit" value="Submit" id="submit">
      </td>
      </tr>
      </table>
      </form>
      </div>
</body>
</html>
